name: Build Wind Executor
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Theos iOS SDK Compiler
        run: |
          bash -c "$(curl -fsSL https://githubusercontent.com)"
          echo "THEOS=~/theos" >> $GITHUB_ENV
          curl -LO https://github.com
          tar -xf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks/

      - name: Compile WindExecutor Engine
        run: |
          export THEOS=~/theos
          make package SUBPROJECTS=OFF FINALPACKAGE=1

      - name: Upload Finished Module File
        uses: actions/upload-artifact@v4
        with:
          name: WindExecutor-Module
          path: .theos/obj/WindExecutor.dylib
